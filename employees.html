<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شؤون الموظفين والرواتب</title>

<style>

body{
font-family:Arial;
background:#121212;
margin:0;
padding:15px;
color:white;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.btn{
padding:10px 15px;
background:#1e1e1e;
color:white;
border:1px solid #333;
border-radius:8px;
cursor:pointer;
}

.btn-success{
background:#00e676;
color:black;
font-weight:bold;
}

.table-wrapper{
overflow-x:auto;
background:#1e1e1e;
padding:10px;
border-radius:10px;
border:1px solid #333;
}

table{
width:100%;
min-width:700px;
border-collapse:collapse;
text-align:center;
font-size:14px;
}

th,td{
border:1px solid #333;
padding:10px;
}

th{
background:#00e676;
color:black;
}

tr:nth-child(even){
background:#151515;
}

/* ===== MODAL ===== */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:#1e1e1e;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
border:1px solid #333;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
background:#121212;
border:1px solid #333;
color:white;
border-radius:8px;
}

.error-text{
color:red;
font-size:12px;
}

</style>
</head>

<body>

<!-- ===== TOP ===== -->
<div class="top-bar">
<h3>👔 إدارة الموظفين والرواتب</h3>
<button class="btn btn-success" onclick="openModal()">➕ إضافة موظف</button>
</div>

<!-- ===== TABLE ===== -->
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>اسم الموظف</th>
<th>الهاتف</th>
<th>الراتب</th>
<th>المسحوبات</th>
<th>الصافي</th>
<th>إجراء</th>
</tr>
</thead>

<tbody id="empTable"></tbody>
</table>
</div>

<!-- ===== MODAL ===== -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>إضافة موظف</h3>

<input id="name" placeholder="اسم الموظف">
<input id="phone" placeholder="رقم الهاتف">
<input id="salary" type="number" placeholder="الراتب">
<input id="draw" type="number" placeholder="المسحوبات">

<div class="error-text" id="err"></div>

<button class="btn btn-success" onclick="saveEmp()">حفظ</button>
<button class="btn" onclick="closeModal()">إلغاء</button>

</div>
</div>

<!-- ===== FIREBASE ===== -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_PROJECT",
storageBucket: "YOUR_PROJECT",
messagingSenderId: "XXX",
appId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.openModal = () => {
document.getElementById("modal").style.display="flex";
}

window.closeModal = () => {
document.getElementById("modal").style.display="none";
}

window.saveEmp = async () => {

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let salary = Number(document.getElementById("salary").value);
let draw = Number(document.getElementById("draw").value || 0);

let err = document.getElementById("err");

if(name.length < 3){
err.innerText="اسم غير صحيح";
return;
}

if(!phone){
err.innerText="رقم غير صحيح";
return;
}

/* حساب الصافي */
let net = salary - draw;

/* حفظ */
let id = push(ref(db,"employees")).key;

await set(ref(db,"employees/"+id),{
name, phone, salary, draw, net
});

/* تحديث الصندوق (الرواتب تعتبر مصروف) */
update(ref(db,"finances"),{
cash: window.cash - draw
});

closeModal();
}

onValue(ref(db,"finances"),(s)=>{
window.cash = s.val()?.cash || 0;
});

onValue(ref(db,"employees"),(s)=>{

let data = s.val();
let html="";

for(let id in data){

let e = data[id];

html += `
<tr>
<td>${e.name}</td>
<td>${e.phone}</td>
<td>${e.salary}</td>
<td>${e.draw}</td>
<td>${e.net}</td>
<td>
<button class="btn" onclick="share('${e.name}','${e.phone}',${e.salary},${e.draw},${e.net})">
📱 واتساب
</button>
</td>
</tr>
`;
}

document.getElementById("empTable").innerHTML = html;

});

window.share = (name,phone,salary,draw,net)=>{

let msg = `كشف موظف:
${name}
راتب: ${salary}
مسحوبات: ${draw}
صافي: ${net}

برمجة وتطوير: عصام المهدي`;

window.open(`https://wa.me/967${phone}?text=${encodeURIComponent(msg)}`,"_blank");

}

</script>

</body>
</html>
