<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم السوبر أدمن</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #2d2d44;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #3d3d5c;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .stat {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #3d3d5c;
        }

        .stat:last-child {
            border-bottom: none;
        }

        .stat-label {
            opacity: 0.7;
            font-size: 14px;
        }

        .stat-value {
            font-weight: bold;
            color: #00ff88;
        }

        .projects-section {
            background: #2d2d44;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #3d3d5c;
        }

        .projects-section h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .project-item {
            background: #1e1e2e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .project-info {
            flex: 1;
        }

        .project-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .project-details {
            font-size: 12px;
            opacity: 0.7;
        }

        .project-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 12px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .btn-success {
            background: #00ff88;
            color: #1e1e2e;
        }

        .btn-success:hover {
            background: #00dd77;
        }

        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-active {
            background: #00ff88;
            color: #1e1e2e;
        }

        .status-inactive {
            background: #ff6b6b;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #2d2d44;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #3d3d5c;
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }

        .form-group select, .form-group input {
            width: 100%;
            padding: 10px;
            background: #1e1e2e;
            border: 1px solid #3d3d5c;
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #00ff88;
            color: #1e1e2e;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>👑 لوحة تحكم السوبر أدمن</h1>
        <p>إدارة شاملة لجميع المشاريع والمستخدمين</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <div class="grid">
        <div class="card">
            <h3>📊 الإحصائيات العامة</h3>
            <div class="stat">
                <span class="stat-label">عدد المشاريع</span>
                <span class="stat-value" id="projectCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">المشاريع النشطة</span>
                <span class="stat-value" id="activeCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">المشاريع المعطلة</span>
                <span class="stat-value" id="inactiveCount">0</span>
            </div>
        </div>

        <div class="card">
            <h3>👥 المستخدمين</h3>
            <div class="stat">
                <span class="stat-label">إجمالي المستخدمين</span>
                <span class="stat-value" id="userCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">مديري المشاريع</span>
                <span class="stat-value" id="adminCount">0</span>
            </div>
        </div>

        <div class="card">
            <h3>💰 الرصيد الإجمالي</h3>
            <div class="stat">
                <span class="stat-label">الصناديق</span>
                <span class="stat-value" id="totalBalance">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">المشتركين</span>
                <span class="stat-value" id="totalSubscribers">0</span>
            </div>
        </div>
    </div>

    <div class="projects-section">
        <h2>🏢 إدارة المشاريع</h2>
        <div id="projectsList"></div>
    </div>
</div>

<div class="modal" id="projectModal">
    <div class="modal-content">
        <div class="modal-header" id="modalTitle">تعديل حالة المشروع</div>
        <div class="form-group">
            <label>حالة المشروع</label>
            <select id="projectStatus">
                <option value="active">🟢 نشط</option>
                <option value="inactive">🔴 معطل</option>
                <option value="suspended">🟡 معلق</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" onclick="closeModal()">إلغاء</button>
            <button class="btn btn-success" onclick="saveProjectStatus()">حفظ</button>
        </div>
    </div>
</div>

<script type="module">
    import { db } from "./config/firebase-config.js";
    import { getAllProjects, changeProjectStatus } from "./js/projects-system.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let projects = [];
    let currentEditingProjectId = null;

    async function loadDashboard() {
        try {
            projects = await getAllProjects(db);
            
            const active = projects.filter(p => p.status === 'active').length;
            const inactive = projects.filter(p => p.status !== 'active').length;
            const usersSnap = await getDocs(collection(db, 'users'));
            const admins = Array.from(usersSnap.docs).filter(u => u.data().role === 'project_admin').length;
            
            document.getElementById('projectCount').textContent = projects.length;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('inactiveCount').textContent = inactive;
            document.getElementById('userCount').textContent = usersSnap.size;
            document.getElementById('adminCount').textContent = admins;
            
            renderProjects();
        } catch (error) {
            showError('خطأ في تحميل البيانات: ' + error.message);
        }
    }

    function renderProjects() {
        const list = document.getElementById('projectsList');
        list.innerHTML = '';
        
        projects.forEach(project => {
            const statusClass = project.status === 'active' ? 'status-active' : 'status-inactive';
            const statusText = project.status === 'active' ? '🟢 نشط' : '🔴 معطل';
            
            const item = document.createElement('div');
            item.className = 'project-item';
            item.innerHTML = `
                <div class="project-info">
                    <div class="project-name">${project.name}</div>
                    <div class="project-details">${project.village} - ${project.governorate}</div>
                </div>
                <span class="status ${statusClass}">${statusText}</span>
                <div class="project-actions">
                    <button class="btn btn-primary" onclick="editProject('${project.id}')">تعديل</button>
                </div>
            `;
            list.appendChild(item);
        });
    }

    window.editProject = function(projectId) {
        currentEditingProjectId = projectId;
        const project = projects.find(p => p.id === projectId);
        document.getElementById('projectStatus').value = project.status;
        document.getElementById('projectModal').classList.add('show');
    };

    window.saveProjectStatus = async function() {
        try {
            const newStatus = document.getElementById('projectStatus').value;
            await changeProjectStatus(db, currentEditingProjectId, newStatus);
            showSuccess('تم تحديث حالة المشروع بنجاح');
            document.getElementById('projectModal').classList.remove('show');
            loadDashboard();
        } catch (error) {
            showError('خطأ: ' + error.message);
        }
    };

    window.closeModal = function() {
        document.getElementById('projectModal').classList.remove('show');
    };

    function showError(message) {
        const div = document.getElementById('errorMessage');
        div.textContent = message;
        div.style.display = 'block';
        setTimeout(() => { div.style.display = 'none'; }, 5000);
    }

    function showSuccess(message) {
        const div = document.getElementById('successMessage');
        div.textContent = message;
        div.style.display = 'block';
        setTimeout(() => { div.style.display = 'none'; }, 3000);
    }

    loadDashboard();
</script>

</body>
</html>
