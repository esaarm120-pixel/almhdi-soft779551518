<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - سوبر أدمن</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#0f172a;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* SIGNATURE */
.signature{
    background:#111827;
    color:#facc15;
    padding:8px;
    overflow:hidden;
    white-space:nowrap;
}

.signature span{
    display:inline-block;
    animation: move 10s linear infinite;
}

@keyframes move{
    0%{transform:translateX(-100%)}
    100%{transform:translateX(100%)}
}

/* LAYOUT */
.container{
    display:grid;
    grid-template-columns:220px 1fr;
    min-height:calc(100vh - 100px);
}

/* SIDEBAR */
.sidebar{
    background:#1e293b;
    color:white;
    padding:10px;
}

.sidebar button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    cursor:pointer;
    background:#334155;
    color:white;
}

.sidebar button:hover{
    background:#475569;
}

/* MAIN */
.main{
    padding:15px;
}

/* CARD */
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

table th, table td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

table th{
    background:#0f172a;
    color:white;
}

/* MOBILE */
@media(max-width:768px){
    .container{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:flex;
        overflow-x:auto;
    }

    .sidebar button{
        min-width:140px;
    }
}
</style>
</head>

<body>

<header>
    <h2>👑 لوحة تحكم سوبر أدمن</h2>
    <div>System Control</div>
</header>

<!-- ✍️ توقيع متحرك -->
<div class="signature">
    <span>برمجة وتطوير عصام المهدي 779551518 — اذكر الله وصل على النبي 🤍</span>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <button onclick="show('home')">الرئيسية</button>
    <button onclick="show('projects')">المشاريع</button>
    <button onclick="show('users')">المستخدمين</button>
    <button onclick="show('settings')">الإعدادات</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="card section">
    <h3>📊 لوحة التحكم</h3>
    <p>مرحباً بك في النظام</p>
</div>

<!-- PROJECTS -->
<div id="projects" class="card section" style="display:none">
    <h3>🏗 المشاريع</h3>

    <input placeholder="اسم المشروع">
    <button>إضافة</button>

    <table>
        <thead>
            <tr>
                <th>اسم المشروع</th>
                <th>مدير المشروع</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>مثال</td>
                <td>مدير</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- USERS -->
<div id="users" class="card section" style="display:none">
    <h3>👤 المستخدمين</h3>

    <input placeholder="الإيميل">
    <select>
        <option>سوبر أدمن</option>
        <option>مدير مشروع</option>
    </select>
    <button>إضافة مستخدم</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="card section" style="display:none">
    <h3>⚙️ الإعدادات (سوبر أدمن)</h3>
    <p>هنا يتم التحكم الكامل بالنظام</p>
</div>

</div>
</div>

<script>
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.style.display='none');
    document.getElementById(id).style.display='block';
}
</script>

</body>
</html>
