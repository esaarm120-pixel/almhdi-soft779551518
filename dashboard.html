<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>

body{
background:#121212;
color:#fff;
font-family:'Segoe UI',sans-serif;
margin:0;
padding:20px;
}

/* ===== الترويسة (بدون تعديل) ===== */
.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e1e1e;
padding:15px;
border-radius:12px;
margin-bottom:25px;
border:1px solid #333;
}

.user-signature{
font-size:14px;
color:#00e676;
font-weight:bold;
}

.project-name{
font-size:16px;
font-weight:bold;
color:#fff;
}

.settings-icon{
font-size:22px;
cursor:pointer;
}

/* ===== ديشبورد جديد ===== */

.dashboard{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e1e1e;
padding:18px;
border-radius:15px;
border:1px solid #333;
text-align:center;
}

.card h4{
margin:0;
font-size:12px;
color:#aaa;
}

.card span{
display:block;
margin-top:8px;
font-size:20px;
font-weight:bold;
color:#00e676;
}

/* أزرار سريعة */
.quick-actions{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:20px;
}

.action-btn{
background:#1e1e1e;
border:1px solid #333;
padding:16px;
border-radius:14px;
color:#fff;
cursor:pointer;
font-size:14px;
}

/* أقسام */
.section{
background:#1e1e1e;
border:1px solid #333;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.section-title{
font-size:14px;
margin-bottom:10px;
font-weight:bold;
}

.alert{
background:#2a2200;
padding:10px;
border-radius:10px;
margin-bottom:8px;
font-size:13px;
}

.activity{
display:flex;
justify-content:space-between;
font-size:13px;
padding:8px 0;
border-bottom:1px solid #2a2a2a;
}

</style>

</head>
<body>

<!-- ===== الترويسة (كما هي) ===== -->
<header class="header">
<div class="user-signature">عصام المهدي</div>
<div class="project-name" id="projectName">جارٍ التحميل...</div>
<div class="settings-icon" onclick="location.href='settings.html'">⚙️</div>
</header>

<!-- ===== الديشبورد الجديد ===== -->
<div class="dashboard">

<div class="card">
<h4>المشتركين</h4>
<span id="subsCount">0</span>
</div>

<div class="card">
<h4>الفواتير غير المسددة</h4>
<span id="pendingBills">0</span>
</div>

<div class="card">
<h4>الصندوق العام</h4>
<span id="cashBalance">0 ر.ي</span>
</div>

<div class="card">
<h4>تحصيل اليوم</h4>
<span id="todayIncome">0 ر.ي</span>
</div>

</div>

<!-- أزرار سريعة -->
<div class="quick-actions">

<button class="action-btn" onclick="location.href='subscribers.html'">👥 المشتركين</button>
<button class="action-btn" onclick="location.href='readings.html'">💧 القراءات</button>
<button class="action-btn" onclick="location.href='expenses.html'">📉 المصروفات</button>
<button class="action-btn" onclick="location.href='receipts.html'">💵 التقارير</button>

</div>

<!-- تنبيهات -->
<div class="section">
<div class="section-title">التنبيهات</div>
<div class="alert">⚠ يوجد فواتير متأخرة تحتاج متابعة</div>
<div class="alert">📌 راجع قراءات المياه الجديدة</div>
</div>

<!-- آخر العمليات -->
<div class="section">
<div class="section-title">آخر العمليات</div>

<div class="activity">
<span>تحصيل فاتورة</span>
<span>0 ر.ي</span>
</div>

<div class="activity">
<span>إضافة مشترك</span>
<span>اليوم</span>
</div>

<div class="activity">
<span>تسجيل قراءة</span>
<span>الآن</span>
</div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "your-project.firebaseapp.com",
databaseURL: "https://your-project.firebaseio.com",
projectId: "your-project",
storageBucket: "your-project.appspot.com",
messagingSenderId: "...",
appId: "..."
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// بيانات الترويسة
onValue(ref(db,'settings/projectName'),(s)=>{
document.getElementById('projectName').innerText = s.val() || "مشروع مياه";
});

// إحصائيات (جاهزة للربط لاحقاً)
onValue(ref(db,'finances/cash'),(s)=>{
document.getElementById('cashBalance').innerText = (s.val()||0) + " ر.ي";
});

</script>

</body>
</html>
