<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>
<style>
:root {
    --primary-blue: #004a99;
    --bg-light: #f4f7f9;
    --card-bg: #ffffff;
    --text-dark: #333;
    --accent: #00e676;
}

body {
    margin: 0;
    padding: 15px;
    background: var(--bg-light);
    color: var(--text-dark);
    font-family: 'Segoe UI', Tahoma, sans-serif;
}

/* الترويسة الزرقاء */
.header {
    background: var(--primary-blue);
    padding: 20px;
    border-radius: 20px;
    color: white;
    margin-bottom: 15px;
}

.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

.header-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    font-size: 14px;
}

.input-wrapper { display: flex; align-items: center; gap: 8px; }

.header-input {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 5px 10px;
    border-radius: 8px;
    flex: 1;
}

/* شريط التوقيع */
.signature {
    background: var(--card-bg);
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 15px;
    overflow: hidden;
    white-space: nowrap;
    border: 1px solid #ddd;
    color: var(--primary-blue);
    font-weight: bold;
}

.marquee {
    display: inline-block;
    padding-right: 100%;
    animation: moveRTL 15s linear infinite;
}

@keyframes moveRTL { 0% {transform: translateX(100%);} 100% {transform: translateX(-100%);} }

/* البطاقات */
.dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.card { background: var(--card-bg); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
.card span { display: block; font-size: 18px; font-weight: bold; color: var(--primary-blue); margin-top: 5px; }
</style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="input-wrapper">اسم المشروع: <input type="text" id="projectNameInput" class="header-input"></div>
        <div onclick="location.href='settings.html'" style="cursor:pointer;">⚙️</div>
    </div>
    <div class="header-grid">
        <div class="input-wrapper">المحافظة: <input type="text" id="governorateNameInput" class="header-input"></div>
        <div class="input-wrapper">المديرية: <input type="text" id="districtNameInput" class="header-input"></div>
        <div class="input-wrapper">القرية: <input type="text" id="villageNameInput" class="header-input"></div>
        <div class="input-wrapper">المدير: <input type="text" id="managerNameInput" class="header-input"></div>
    </div>
</div>

<div class="signature" id="signature">
    <div class="marquee">✨ برمجة وتطوير عصام المهدي 779551518 | اذكر الله وصل على النبي ﷺ ✨</div>
</div>

<!-- بقية عناصر الصفحة (Dashboard & Actions) تبقى كما هي برمجياً -->
<!-- تأكد من الاحتفاظ بنفس IDs العناصر (subsCount, pendingBills, إلخ) كما في كودك الأصلي -->

<script type="module">
    // تم الاحتفاظ بنفس منطق Firebase الخاص بك
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzUUx_A0PyMwtEij_uFyLBwzJPZkVxdnk",
        authDomain: "almhdi-soft779551518.firebaseapp.com",
        databaseURL: "https://almhdi-soft779551518-default-rtdb.firebaseio.com",
        projectId: "almhdi-soft779551518",
        storageBucket: "almhdi-soft779551518.appspot.com",
        messagingSenderId: "386533839313",
        appId: "1:386533839313:web:575bc9978c0e38ffd950f0",
        measurementId: "G-MZSN60VZ63"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ربط الحقول بنفس المسارات القديمة لضمان عملها
    onValue(ref(db,'settings/projectName'), s => { document.getElementById('projectNameInput').value = s.val() || ""; });
    onValue(ref(db,'settings/village'), s => { document.getElementById('villageNameInput').value = s.val() || ""; });
    onValue(ref(db,'settings/manager'), s => { document.getElementById('managerNameInput').value = s.val() || ""; });
    onValue(ref(db,'settings/district'), s => { document.getElementById('districtNameInput').value = s.val() || ""; });
    onValue(ref(db,'settings/governorate'), s => { document.getElementById('governorateNameInput').value = s.val() || ""; });
</script>
</body>
</html>
