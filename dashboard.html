<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم مشروع المياه</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #eef2f7; color: #333; margin: 0; padding: 15px; }
        
        /* شريط التمرير */
        .marquee-text { background-color: #007bff; color: white; padding: 10px; text-align: center; font-weight: bold; overflow: hidden; border-radius: 4px; margin-bottom: 10px; }
        
        /* الترويسة */
        .header-container { display: flex; justify-content: space-between; align-items: center; background-color: #ffffff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-box { width: 70px; height: 70px; border: 2px dashed #007bff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        
        /* نظام الصناديق */
        .funds-container { display: flex; gap: 10px; margin-top: 15px; }
        .fund-card { flex: 1; background: #fff; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-right: 4px solid #007bff; }
        
        /* الأزرار */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .menu-btn { background-color: #007bff; color: white; padding: 15px 10px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .full-width-btn { grid-column: span 2; background-color: #28a745; }
        
        /* أزرار السفلية */
        .footer-btns { display: flex; gap: 10px; margin-top: 15px; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <div class="marquee-text">
        برمجة وتطوير: عصام المهدي <a href="https://wa.me/967779551518" style="color: yellow; text-decoration: none;">779551518</a>
    </div>

    <div class="header-container">
        <div style="font-size: 13px;">المشروع: <strong>مياه قرية الحسينية</strong></div>
        <div class="logo-box">🚰</div>
        <button id="logoutBtn" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px;">خروج</button>
    </div>

    <div class="funds-container">
        <div class="fund-card">الصندوق العام<br><strong id="cashBalance">0 ر.ي</strong></div>
        <div class="fund-card">صندوق الصرافة<br><strong id="exchangeBalance">0 ر.ي</strong></div>
    </div>

    <div class="grid-container">
        <button class="menu-btn" onclick="location.href='subscribers.html'">👥 المشتركين</button>
        <button class="menu-btn" onclick="location.href='employees.html'">👔 الموظفين</button>
        <button class="menu-btn" onclick="location.href='expenses.html'">📉 المصروفات</button>
        <button class="menu-btn" onclick="location.href='readings.html'">💧 القراءات</button>
        <button class="menu-btn full-width-btn" onclick="location.href='receipts.html'">💵 سند قبض وتقارير</button>
    </div>

    <div class="footer-btns">
        <button class="action-btn" style="background:#6c757d;" onclick="location.href='settings.html'">⚙️ الإعدادات والألوان</button>
    </div>

    <script type="module">
        import { logoutUser } from "./js/auth-manager.js";
        document.getElementById('logoutBtn').addEventListener('click', logoutUser);
    </script>
</body>
</html>
