<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>

:root{
--main:#00e676;
--bg:#121212;
--card:#1e1e1e;
--border:#333;
}

body{
margin:0;
padding:20px;
background:var(--bg);
color:white;
font-family:Arial;
}

/* ===== HEADER ===== */
.header{
background:var(--card);
padding:15px;
border-radius:15px;
border:1px solid var(--border);
margin-bottom:10px;
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.project-name{
font-size:18px;
font-weight:bold;
color:var(--main);
display: flex;
align-items: center;
gap: 10px;
}

.header-info{
font-size:13px;
color:#aaa;
margin-top:15px;
line-height:1.7;
display: flex;
flex-wrap: wrap;
gap: 15px;
}

/* ستايل حقول الترويسة */
.header-input {
    background: transparent;
    border: 1px solid var(--border);
    color: white;
    padding: 6px 10px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    width: 130px;
    transition: 0.3s;
}
.header-input:focus {
    outline: none;
    border-color: var(--main);
    background: rgba(0, 230, 118, 0.05);
}

/* ===== SIGNATURE (بين الترويسة والواجهة) ===== */
.signature{
margin:10px 0;
background:var(--card);
padding:10px;
border-radius:12px;
border:1px solid var(--border);
overflow:hidden;
white-space:nowrap;
}

.marquee{
display:inline-block;
white-space:nowrap;
padding-right:100%;
animation:moveRTL 14s linear infinite;
font-weight:bold;
color:var(--main);
}

@keyframes moveRTL{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

/* ===== DASHBOARD ===== */
.dashboard{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:10px;
}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
border:1px solid var(--border);
text-align:center;
}

.card h4{
margin:0;
font-size:12px;
color:#aaa;
}

.card span{
display:block;
margin-top:8px;
font-size:20px;
font-weight:bold;
color:var(--main);
}

/* ===== BUTTONS ===== */
.section{
background:var(--card);
padding:15px;
border-radius:12px;
margin-top:15px;
border:1px solid var(--border);
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid var(--border);
background:transparent;
color:white;
cursor:pointer;
}

.btn:hover{
border-color:var(--main);
}

</style>
</head>

<body>

<div class="header">

    <div class="header-top">
        <div class="project-name">
            مشروع مياه: 
            <input type="text" id="projectNameInput" class="header-input" placeholder="اسم المشروع">
        </div>
        <div onclick="location.href='settings.html'" style="cursor:pointer;font-size:22px;">⚙️</div>
    </div>

    <div class="header-info">
        <div style="display: flex; align-items: center; gap: 5px;">
            🌍 المحافظة: <input type="text" id="governorateNameInput" class="header-input">
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            🏢 المديرية: <input type="text" id="districtNameInput" class="header-input">
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            🏘️ القرية: <input type="text" id="villageNameInput" class="header-input">
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            👤 المدير: <input type="text" id="managerNameInput" class="header-input">
        </div>
    </div>

</div>

<div class="signature" id="signature">
<div class="marquee">
✨ برمجة وتطوير : عصام المهدي | 779551518 ✨ &nbsp;&nbsp; ✦ &nbsp;&nbsp;
لا تنسَ ذكر الله والصلاة على النبي ﷺ
</div>
</div>

<div class="dashboard">

<div class="card">
<h4>👥 المشتركين</h4>
<span id="subsCount">0</span>
</div>

<div class="card">
<h4>🧾 الفواتير</h4>
<span id="pendingBills">0</span>
</div>

<div class="card">
<h4>💰 الصندوق (نقد)</h4>
<span id="cashBalance">0</span>
</div>

<div class="card">
<h4>🏦 التحويل</h4>
<span id="transferBalance">0</span>
</div>

</div>

<div class="section">

<button class="btn" onclick="location.href='subscribers.html'">👥 المشتركين</button>
<button class="btn" onclick="location.href='readings.html'">💧 القراءات</button>
<button class="btn" onclick="location.href='expenses.html'">📉 المصروفات</button>
<button class="btn" onclick="location.href='receipt.html'">🧾 سند قبض</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzUUx_A0PyMwtEij_uFyLBwzJPZkVxdnk",
    authDomain: "almhdi-soft779551518.firebaseapp.com",
    databaseURL: "https://almhdi-soft779551518-default-rtdb.firebaseio.com",
    projectId: "almhdi-soft779551518",
    storageBucket: "almhdi-soft779551518.appspot.com",
    messagingSenderId: "386533839313",
    appId: "1:386533839313:web:575bc9978c0e38ffd950f0",
    measurementId: "G-MZSN60VZ63"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== SETTINGS ===== */
onValue(ref(db,'settings/projectName'),s=>{
    if(document.getElementById('projectNameInput')) projectNameInput.value = s.val() || "";
});

onValue(ref(db,'settings/village'),s=>{
    if(document.getElementById('villageNameInput')) villageNameInput.value = s.val() || "";
});

onValue(ref(db,'settings/manager'),s=>{
    if(document.getElementById('managerNameInput')) managerNameInput.value = s.val() || "";
});

onValue(ref(db,'settings/district'),s=>{
    if(document.getElementById('districtNameInput')) districtNameInput.value = s.val() || "";
});

onValue(ref(db,'settings/governorate'),s=>{
    if(document.getElementById('governorateNameInput')) governorateNameInput.value = s.val() || "";
});

/* ===== STATS ===== */
onValue(ref(db,'stats/subscribers'),s=>{
subsCount.innerText = s.val() || 0;
});

onValue(ref(db,'stats/pendingBills'),s=>{
pendingBills.innerText = s.val() || 0;
});

/* ===== CASH BOX ===== */
onValue(ref(db,'cashBox'),s=>{
cashBalance.innerText = s.val() || 0;
});

/* ===== TRANSFER BOX ===== */
onValue(ref(db,'transferBox'),s=>{
transferBalance.innerText = s.val() || 0;
});

/* ===== THEME ===== */
onValue(ref(db,'settings/themeColor'),s=>{
document.documentElement.style.setProperty('--main', s.val() || '#00e676');
});

/* ===== SIGNATURE ANIMATION ===== */
const colors=["#00e676","#00bcd4","#ffeb3b","#ff5252","#ab47bc","#42a5f5"];
let i=0;

setInterval(()=>{
document.getElementById("signature").style.color = colors[i];
i = (i + 1) % colors.length;
},2000);

</script>

</body>
</html>
