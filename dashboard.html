<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
:root { --primary: #004a99; --bg: #f0f2f5; --card: #ffffff; }
body { margin: 0; padding: 10px; background: var(--bg); font-family: sans-serif; }

.header { background: var(--primary); padding: 15px; border-radius: 15px; color: white; margin-bottom: 10px; }
.header-input { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px; border-radius: 5px; width: 100%; cursor: not-allowed; }

.signature { background: var(--card); padding: 10px; border-radius: 10px; overflow: hidden; white-space: nowrap; border: 1px solid #ddd; margin-bottom: 10px; }
.marquee { display: inline-block; animation: move 15s linear infinite; color: var(--primary); font-weight: bold; }
/* اتجاه الحركة من اليمين إلى اليسار */
@keyframes move { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }

.dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
</style>
</head>
<body>

<div class="header">
    <div style="display: flex; justify-content: space-between;">
        <strong>لوحة التحكم</strong>
        <div onclick="location.href='settings.html'">⚙️</div>
    </div>
    <label style="font-size: 12px;">اسم المشروع</label>
    <input type="text" id="projectNameInput" class="header-input" readonly>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
        <div><label style="font-size: 12px;">المحافظة</label><input type="text" id="governorateNameInput" class="header-input" readonly></div>
        <div><label style="font-size: 12px;">المديرية</label><input type="text" id="districtNameInput" class="header-input" readonly></div>
        <div><label style="font-size: 12px;">القرية</label><input type="text" id="villageNameInput" class="header-input" readonly></div>
        <div><label style="font-size: 12px;">المدير</label><input type="text" id="managerNameInput" class="header-input" readonly></div>
    </div>
</div>

<div class="signature">
    <div class="marquee">✨ برمجة وتطوير عصام المهدي 779551518 ✦ اذكر الله وصل على النبي ﷺ ✨</div>
</div>

<div class="dashboard">
    <div class="card"><h4>👥 المشتركين</h4><span id="subsCount">0</span></div>
    <div class="card"><h4>🧾 الفواتير</h4><span id="pendingBills">0</span></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
    
    // إعداداتك كما هي..
    const firebaseConfig = { /* انسخ إعداداتك القديمة هنا */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // جلب البيانات مع وضع القيمة في الحقول (المحمية بـ readonly)
    const fields = ['projectName', 'village', 'manager', 'district', 'governorate'];
    fields.forEach(f => {
        onValue(ref(db, 'settings/'+f), s => {
            const el = document.getElementById(f+'Input');
            if(el) el.value = s.val() || "";
        });
    });
</script>
</body>
</html>
