<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الكاملة</title>
    <style>
        :root { --primary: #004a99; --bg: #f4f7f9; --card: #ffffff; --text: #333; }
        body { margin: 0; padding: 10px; background: var(--bg); font-family: sans-serif; }

        /* الترويسة */
        .header { background: var(--primary); padding: 15px; color: white; border-radius: 15px; margin-bottom: 10px; }
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .header-input { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px; border-radius: 5px; cursor: not-allowed; width: 100%; box-sizing: border-box; }
        
        /* التوقيع - حركة من اليسار لليمين */
        .signature { background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid #ddd; overflow: hidden; margin-bottom: 10px; }
        .marquee { display: inline-block; animation: move 15s linear infinite; color: var(--primary); font-weight: bold; white-space: nowrap; }
        @keyframes move { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* البطاقات */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .card { background: var(--card); padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .card span { display: block; font-size: 16px; font-weight: bold; color: var(--primary); margin-top: 5px; }
        
        /* العمليات السريعة */
        .quick-actions { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .action-btn { background: var(--card); padding: 8px; border-radius: 10px; text-align: center; font-size: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; justify-content:space-between;"><strong>مشروع مياه بني الحارث</strong> <span onclick="location.href='settings.html'">⚙️</span></div>
    <div class="header-grid">
        <div><small>المحافظة</small><input type="text" id="governorateNameInput" class="header-input" readonly></div>
        <div><small>المديرية</small><input type="text" id="districtNameInput" class="header-input" readonly></div>
        <div><small>القرية</small><input type="text" id="villageNameInput" class="header-input" readonly></div>
        <div><small>المدير</small><input type="text" id="managerNameInput" class="header-input" readonly></div>
    </div>
</div>

<div class="signature">
    <div class="marquee">✨ برمجة وتطوير عصام المهدي 779551518 ✦ اذكر الله وصل على النبي ﷺ ✨</div>
</div>

<div class="dashboard">
    <div class="card"><h4>المشتركين</h4><span id="subsCount">0</span></div>
    <div class="card"><h4>الفواتير</h4><span id="pendingBills">0</span></div>
    <div class="card"><h4>سندات قبض</h4><span id="receipts">0</span></div>
</div>

<div class="quick-actions">
    <div class="action-btn">💧<br>قراءة</div>
    <div class="action-btn">📉<br>مصروف</div>
    <div class="action-btn">📥<br>قبض</div>
    <div class="action-btn">👥<br>مشترك</div>
    <div class="action-btn">🏦<br>صندوق</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzUUx_A0PyMwtEij_uFyLBwzJPZkVxdnk",
        authDomain: "almhdi-soft779551518.firebaseapp.com",
        databaseURL: "https://almhdi-soft779551518-default-rtdb.firebaseio.com",
        projectId: "almhdi-soft779551518",
        storageBucket: "almhdi-soft779551518.appspot.com",
        messagingSenderId: "386533839313",
        appId: "1:386533839313:web:575bc9978c0e38ffd950f0",
        measurementId: "G-MZSN60VZ63"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ربط البيانات
    const inputs = { 'villageNameInput': 'settings/village', 'managerNameInput': 'settings/manager', 'districtNameInput': 'settings/district', 'governorateNameInput': 'settings/governorate' };
    Object.keys(inputs).forEach(id => { onValue(ref(db, inputs[id]), s => { document.getElementById(id).value = s.val() || ""; }); });
    
    onValue(ref(db,'stats/subscribers'), s => { document.getElementById('subsCount').innerText = s.val() || 0; });
    onValue(ref(db,'stats/pendingBills'), s => { document.getElementById('pendingBills').innerText = s.val() || 0; });
</script>
</body>
</html>
