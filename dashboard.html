<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

body{
margin:0;
padding:20px;
background:#121212;
color:white;
font-family:Arial;
}

/* ===== SIGNATURE ONLY ===== */
.signature{
margin-top:15px;
background:#1e1e1e;
padding:10px;
border-radius:12px;
border:1px solid #333;
overflow:hidden;
white-space:nowrap;
direction:rtl;
}

.marquee{
display:inline-block;
white-space:nowrap;
padding-right:100%;
animation:moveRTL 15s linear infinite;
font-weight:bold;
}

/* حركة من اليمين لليسار */
@keyframes moveRTL{
0%{
transform:translateX(100%);
}
100%{
transform:translateX(-100%);
}
}

/* تأثير ناعم */
#signature{
transition:0.5s;
}

</style>
</head>

<body>

<!-- ===== SIGNATURE ===== -->
<div class="signature" id="signature">
<div class="marquee">
✨ برمجة وتطوير : عصام المهدي | 779551518 ✨ &nbsp;&nbsp; ✦ &nbsp;&nbsp;
لا تنسَ ذكر الله والصلاة على النبي ﷺ
</div>
</div>

<script>

/* ألوان متغيرة */
const colors = [
"#00e676",
"#00bcd4",
"#ffeb3b",
"#ff5252",
"#ab47bc",
"#42a5f5"
];

let i = 0;

setInterval(()=>{
document.getElementById("signature").style.color = colors[i];
i = (i + 1) % colors.length;
},2000);

</script>

</body>
</html>
