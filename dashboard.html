<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - مشروع المياه</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f7;
            color: #333333;
            margin: 0;
            padding: 15px;
        }
        .marquee-text {
            background-color: #007bff;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            border-radius: 4px;
        }
        .marquee-text span {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100%, 0); }
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-side { width: 40%; }
        .header-center { width: 20%; text-align: center; }
        .logo-box {
            width: 70px; height: 70px; border: 2px dashed #007bff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .menu-btn {
            background-color: #007bff;
            color: white;
            padding: 20px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stats-container {
            background-color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .footer-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .action-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #333333;
            color: white;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #ffffff; color: #333333;
            padding: 20px; border-radius: 8px; width: 90%; max-width: 400px;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="marquee-text">
        <span>برمجة وتطوير: عصام المهدي <a href="https://wa.me/967779551518" style="color: yellow; text-decoration: none;">779551518</a></span>
    </div>

    <div class="header-container">
        <div class="header-side">
            <div><strong>المشروع:</strong> <span id="lblProject">مياه قرية الحسينية</span></div>
            <div><strong>المدير:</strong> <span id="lblManager">كامل المهدي</span></div>
        </div>
        <div class="header-center">
            <div class="logo-box">🚰</div>
        </div>
        <div class="header-side" style="text-align: left;">
            <div><strong>المحافظة:</strong> <span id="lblGov">الحديدة</span></div>
            <div><strong>المديرية:</strong> <span id="lblDist">المنصورية</span></div>
            <div><strong>القرية:</strong> <span id="lblVil">الحسينية</span></div>
        </div>
    </div>

    <div class="grid-container">
        <button class="menu-btn" onclick="alert('جاري الانتقال لقسم المشتركين...')">👥 المشتركون</button>
        <button class="menu-btn" onclick="alert('جاري الانتقال لقسم الموظفين...')">👔 الموظفون</button>
        <button class="menu-btn" onclick="alert('جاري الانتقال لقسم المصروفات...')">📉 المصروفات</button>
        <button class="menu-btn" onclick="alert('جاري الانتقال لقسم قراءة الاستهلاك...')">💧 قراءات العدادات</button>
    </div>

    <div class="stats-container">
        <h3>📊 حالة المشروع الحالية</h3>
        <p>عدد المشتركين: <strong>0</strong> | الاستهلاك الحالي: <strong>0 وحدة</strong></p>
    </div>

    <div class="footer-btns">
        <button class="action-btn" id="btnSettings">⚙️ إعدادات التطبيق</button>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>⚙️ إعدادات بيانات المشروع</h3>
            <div class="form-group"><label>اسم المشروع:</label><input type="text" id="inProject" value="مياه قرية الحسينية"></div>
            <div class="form-group"><label>اسم المدير:</label><input type="text" id="inManager" value="كامل المهدي"></div>
            <div class="form-group"><label>المحافظة:</label><input type="text" id="inGov" value="الحديدة"></div>
            <div class="form-group"><label>المديرية:</label><input type="text" id="inDist" value="المنصورية"></div>
            <div class="form-group"><label>القرية:</label><input type="text" id="inVil" value="الحسينية"></div>
            <button class="action-btn" style="background-color: #28a745; width: 100%; margin-bottom: 10px;" id="btnSaveSettings">حفظ وتحديث</button>
            <button class="action-btn" style="width: 100%; background-color: #cccccc; color: #333;" id="btnCloseSettings">إلغاء</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('settingsModal');
        document.getElementById('btnSettings').addEventListener('click', () => modal.style.display = 'flex');
        document.getElementById('btnCloseSettings').addEventListener('click', () => modal.style.display = 'none');
        
        document.getElementById('btnSaveSettings').addEventListener('click', () => {
            document.getElementById('lblProject').innerText = document.getElementById('inProject').value;
            document.getElementById('lblManager').innerText = document.getElementById('inManager').value;
            document.getElementById('lblGov').innerText = document.getElementById('inGov').value;
            document.getElementById('lblDist').innerText = document.getElementById('inDist').value;
            document.getElementById('lblVil').innerText = document.getElementById('inVil').value;
            modal.style.display = 'none';
        });
    </script>
</body>
</html>
