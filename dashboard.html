<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مياه الحسينية</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .card { flex: 1; background: #fff; padding: 25px 15px; border-radius: 15px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border-bottom: 5px solid #007bff; }
        .card h4 { margin: 0; font-size: 14px; color: #777; }
        .card span { font-size: 22px; font-weight: bold; color: #333; display: block; margin-top: 10px; }
        .btn-menu { width: 100%; padding: 20px; margin-bottom: 15px; border: none; border-radius: 12px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-weight: 600; color: #444; text-align: right; cursor: pointer; transition: 0.3s; }
        .btn-menu::before { content: '▸'; margin-left: 10px; color: #007bff; }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="card">
            <h4>الصندوق العام</h4>
            <span id="cashBalance">٠ ر.ي</span>
        </div>
        <div class="card" style="border-bottom-color: #28a745;">
            <h4>صندوق الصرافة</h4>
            <span id="exchangeBalance">٠ ر.ي</span>
        </div>
    </div>

    <button class="btn-menu" onclick="location.href='subscribers.html'">👥 المشتركين</button>
    <button class="btn-menu" onclick="location.href='expenses.html'">📉 المصروفات</button>
    <button class="btn-menu" onclick="location.href='readings.html'">💧 القراءات</button>
    <button class="btn-menu" onclick="location.href='receipts.html'">💵 سند قبض وتقارير</button>
    <button class="btn-menu" style="color: #dc3545;" id="logoutBtn">🚪 خروج</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
        import { logoutUser } from "./js/auth-manager.js";

        // --- البيانات الخاصة بك مدمجة هنا مباشرة ---
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ربط البيانات
        onValue(ref(db, 'finances/cash'), (s) => document.getElementById('cashBalance').innerText = (s.val() || 0) + ' ر.ي');
        onValue(ref(db, 'finances/exchange'), (s) => document.getElementById('exchangeBalance').innerText = (s.val() || 0) + ' ر.ي');
        
        document.getElementById('logoutBtn').addEventListener('click', logoutUser);
    </script>
</body>
</html>
