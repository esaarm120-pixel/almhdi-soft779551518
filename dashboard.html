<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* الترويسة المحدثة */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .header h2 { margin: 0; font-size: 16px; color: #aaa; font-weight: normal; } /* اسم المشروع هنا */
        .header .user-signature { font-size: 14px; color: #00e676; font-weight: bold; } /* توقيعك هنا */
        .settings-icon { font-size: 20px; color: #aaa; cursor: pointer; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .card h4 { margin: 0; font-size: 12px; color: #aaa; }
        .card span { font-size: 18px; font-weight: bold; color: #00e676; display: block; margin-top: 8px; }
        
        .menu-btn { width: 100%; background: #1e1e1e; border: 1px solid #333; color: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; font-size: 15px; text-align: right; cursor: pointer; }
        
        .signature { text-align: center; color: #555; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-signature">عصام المهدي</div>
        <h2 id="projectName">اسم المشروع</h2>
        <div class="settings-icon" onclick="location.href='settings.html'">⚙️</div>
    </div>

    <div class="stats-container">
        <div class="card">
            <h4>الصندوق العام</h4>
            <span id="cashBalance">٠ ر.ي</span>
        </div>
        <div class="card">
            <h4>صندوق الصرافة</h4>
            <span id="exchangeBalance">٠ ر.ي</span>
        </div>
    </div>

    <button class="menu-btn" onclick="location.href='subscribers.html'">👥 المشتركين</button>
    <button class="menu-btn" onclick="location.href='expenses.html'">📉 المصروفات</button>
    <button class="menu-btn" onclick="location.href='readings.html'">💧 القراءات</button>
    <button class="menu-btn" onclick="location.href='receipts.html'">💵 سند قبض وتقارير</button>
    <button class="menu-btn" style="color: #ff5252;" id="logoutBtn">🚪 تسجيل الخروج</button>

    <div class="signature">© 2026 جميع الحقوق محفوظة</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
        
        // **بياناتك هنا**
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // جلب اسم المشروع من الفايربيس (إعدادات المشروع)
        onValue(ref(db, 'settings/projectName'), (s) => {
            document.getElementById('projectName').innerText = s.val() || "مشروع جديد";
        });

        // جلب الأرصدة
        onValue(ref(db, 'finances/cash'), (s) => document.getElementById('cashBalance').innerText = (s.val() || 0) + ' ر.ي');
        onValue(ref(db, 'finances/exchange'), (s) => document.getElementById('exchangeBalance').innerText = (s.val() || 0) + ' ر.ي');
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
