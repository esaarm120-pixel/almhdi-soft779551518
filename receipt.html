<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سند قبض</title>

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
padding:20px;
}

.card{
background:#1e1e1e;
padding:15px;
border-radius:12px;
margin-bottom:12px;
border:1px solid #333;
}

h2{color:#00e676}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #333;
background:#121212;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00e676;
font-weight:bold;
cursor:pointer;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.small{
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<h2>🧾 سند قبض احترافي</h2>

<div class="card">

<!-- اختيار المشترك -->
<label>👤 اختر المشترك</label>
<select id="customerList">
<option value="">جاري التحميل...</option>
</select>

<!-- المبلغ -->
<label>💰 المبلغ</label>
<input id="amount" type="number" placeholder="0">

<!-- ملاحظة -->
<label>📝 ملاحظة</label>
<input id="note" placeholder="مثال: تسديد فاتورة ماء">

<!-- طريقة الدفع -->
<label>💳 طريقة الدفع</label>
<select id="type" onchange="toggleMixed()">
<option value="cash">💵 نقد</option>
<option value="transfer">🏦 تحويل</option>
<option value="mixed">🔀 مختلط</option>
</select>

<!-- تقسيم مختلط -->
<div id="mixedBox" style="display:none">
<div class="row">
<input id="cashPart" type="number" placeholder="نقد">
<input id="transferPart" type="number" placeholder="تحويل">
</div>
<div class="small">إذا اخترت مختلط يجب توزيع المبلغ</div>
</div>

<button onclick="saveReceipt()">💾 حفظ سند القبض</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
import { getDatabase, ref, push, set, get, update, onValue } 
from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== تحميل المشتركين ===== */
const customerList = document.getElementById("customerList");

onValue(ref(db,"customers"), snapshot=>{
customerList.innerHTML = "<option value=''>اختر المشترك</option>";

snapshot.forEach(child=>{
const data = child.val();
customerList.innerHTML += `
<option value="${child.key}">${data.name}</option>
`;
});
});

/* ===== إظهار المختلط ===== */
window.toggleMixed = function(){
const type = document.getElementById("type").value;
document.getElementById("mixedBox").style.display =
type === "mixed" ? "block" : "none";
}

/* ===== حفظ سند القبض ===== */
window.saveReceipt = async function(){

const customerId = customerList.value;
const amount = Number(document.getElementById("amount").value);
const note = document.getElementById("note").value;
const type = document.getElementById("type").value;

if(!customerId || !amount){
alert("أدخل البيانات كاملة");
return;
}

let cash = 0;
let transfer = 0;

if(type === "cash") cash = amount;
else if(type === "transfer") transfer = amount;
else{
cash = Number(document.getElementById("cashPart").value || 0);
transfer = Number(document.getElementById("transferPart").value || 0);
}

const txRef = push(ref(db,"transactions"));

await set(txRef,{
type:"income",
customerId,
amount,
cash,
transfer,
note,
date:Date.now()
});

/* تحديث الصناديق */
const cashRef = ref(db,"cashBox");
const transferRef = ref(db,"transferBox");

const cashSnap = await get(cashRef);
const transferSnap = await get(transferRef);

await update(ref(db),{
cashBox:(cashSnap.val()||0)+cash,
transferBox:(transferSnap.val()||0)+transfer
});

alert("تم حفظ سند القبض بنجاح ✔️");

document.getElementById("amount").value="";
document.getElementById("note").value="";
document.getElementById("cashPart").value="";
document.getElementById("transferPart").value="";
}

</script>

</body>
</html>
