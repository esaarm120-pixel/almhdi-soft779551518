<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سند قبض</title>

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
padding:20px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
}

h2{
color:#00e676;
text-align:center;
margin-bottom:15px;
}

.card{
background:#1e1e1e;
padding:15px;
border-radius:12px;
border:1px solid #333;
margin-bottom:12px;
}

label{
font-size:13px;
color:#aaa;
display:block;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #333;
background:#121212;
color:white;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#00e676;
font-weight:bold;
cursor:pointer;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.small{
font-size:11px;
color:#888;
margin-top:5px;
}

#mixedBox{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>🧾 سند قبض</h2>

<div class="card">

<label>👤 المشترك</label>
<select id="customerList">
<option value="">جاري التحميل...</option>
</select>

<label>💰 المبلغ</label>
<input id="amount" type="number" placeholder="أدخل المبلغ">

<label>📝 ملاحظة</label>
<input id="note" placeholder="مثال: تسديد فاتورة">

<label>💳 طريقة الدفع</label>
<select id="type" onchange="toggleMixed()">
<option value="cash">💵 نقد</option>
<option value="transfer">🏦 تحويل</option>
<option value="mixed">💳 نقد + تحويل</option>
</select>

<div id="mixedBox">
<div class="row">
<input id="cashPart" type="number" placeholder="نقد">
<input id="transferPart" type="number" placeholder="تحويل">
</div>
<div class="small">يجب توزيع المبلغ بين النقد والتحويل</div>
</div>

<button onclick="saveReceipt()">💾 حفظ سند القبض</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
import { getDatabase, ref, push, set, get, update, onValue }
from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzUUx_A0PyMwtEij_uFyLBwzJPZkVxdnk",
    authDomain: "almhdi-soft779551518.firebaseapp.com",
    databaseURL: "https://almhdi-soft779551518-default-rtdb.firebaseio.com",
    projectId: "almhdi-soft779551518",
    storageBucket: "almhdi-soft779551518.appspot.com",
    messagingSenderId: "386533839313",
    appId: "1:386533839313:web:575bc9978c0e38ffd950f0",
    measurementId: "G-MZSN60VZ63"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== تحميل المشتركين ===== */
const customerList = document.getElementById("customerList");

onValue(ref(db,"customers"), snapshot=>{
customerList.innerHTML = "<option value=''>اختر المشترك</option>";

snapshot.forEach(child=>{
let data = child.val();
customerList.innerHTML += `<option value="${child.key}">${data.name}</option>`;
});
});

/* ===== إظهار النقد + تحويل ===== */
window.toggleMixed = function(){
const type = document.getElementById("type").value;
document.getElementById("mixedBox").style.display =
(type === "mixed") ? "block" : "none";
}

/* ===== حفظ سند القبض ===== */
window.saveReceipt = async function(){

const customerId = document.getElementById("customerList").value;
const amount = Number(document.getElementById("amount").value);
const note = document.getElementById("note").value;
const type = document.getElementById("type").value;

if(!customerId || !amount){
alert("⚠️ أكمل البيانات");
return;
}

let cash = 0;
let transfer = 0;

if(type === "cash"){
cash = amount;
}
else if(type === "transfer"){
transfer = amount;
}
else{
cash = Number(document.getElementById("cashPart").value || 0);
transfer = Number(document.getElementById("transferPart").value || 0);
}

const txRef = push(ref(db,"transactions"));

await set(txRef,{
type:"income",
customerId,
amount,
cash,
transfer,
note,
date:Date.now()
});

/* ===== تحديث الصناديق ===== */
const cashRef = ref(db,"cashBox");
const transferRef = ref(db,"transferBox");

const cashSnap = await get(cashRef);
const transferSnap = await get(transferRef);

await update(ref(db),{
cashBox:(cashSnap.val()||0)+cash,
transferBox:(transferSnap.val()||0)+transfer
});

alert("✅ تم حفظ سند القبض");

document.getElementById("amount").value="";
document.getElementById("note").value="";
document.getElementById("cashPart").value="";
document.getElementById("transferPart").value="";
document.getElementById("type").value="cash";
document.getElementById("mixedBox").style.display="none";
}

</script>

</body>
</html>
