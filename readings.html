<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قراءات الاستهلاك</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
        
        .navbar {
            background: linear-gradient(135deg, #17a2b8 0%, #0f7a8f 100%);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar h1 { font-size: 20px; }
        .navbar button { padding: 8px 15px; background: white; color: #17a2b8; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h2 { color: #333; margin-bottom: 10px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .controls input, .controls select, .controls button {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .controls button { background: #17a2b8; color: white; cursor: pointer; border: none; font-weight: bold; }
        .controls button:hover { background: #0f7a8f; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .value { font-size: 28px; color: #17a2b8; font-weight: bold; }
        
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #17a2b8; color: white; padding: 12px; text-align: right; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        
        .btn-small { padding: 5px 10px; margin: 0 2px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-edit { background: #28a745; color: white; }
        .btn-delete { background: #dc3545; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 500px; margin: 50px auto; position: relative; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #28a745; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
        .close { position: absolute; top: 10px; left: 20px; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

<div class="navbar">
    <h1>💧 قراءات الاستهلاك</h1>
    <div>
        <button onclick="goBack()">📊 العودة</button>
        <button onclick="logout()">🚪 خروج</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h2>تسجيل قراءات استهلاك المياه</h2>
        <p>تتبع استهلاك المياه للمشتركين بشكل يومي</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h3>إجمالي الاستهلاك</h3>
            <div class="value" id="totalUsage">0</div>
            <small>وحدة</small>
        </div>
        <div class="stat-card">
            <h3>عدد القراءات</h3>
            <div class="value" id="readingCount">0</div>
        </div>
        <div class="stat-card">
            <h3>متوسط الاستهلاك</h3>
            <div class="value" id="avgUsage">0</div>
            <small>وحدة</small>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن مشترك...">
        <input type="month" id="monthFilter">
        <button onclick="openReadingModal()">➕ إضافة قراءة</button>
        <button onclick="generateMonthlyReport()" style="background: #007bff;">📊 تقرير شهري</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>رقم المشترك</th>
                    <th>اسم المشترك</th>
                    <th>القراءة السابقة</th>
                    <th>القراءة الحالية</th>
                    <th>الاستهلاك</th>
                    <th>ملاحظات</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="readingsTable">
                <tr><td colspan="8" style="text-align: center; color: #999;">جاري تحميل البيانات...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal إضافة قراءة -->
<div class="modal" id="readingModal">
    <div class="modal-content">
        <span class="close" onclick="closeReadingModal()">&times;</span>
        <h3>➕ إضافة قراءة جديدة</h3>
        <div class="form-group">
            <label>التاريخ:</label>
            <input type="date" id="readingDate">
        </div>
        <div class="form-group">
            <label>رقم المشترك:</label>
            <input type="text" id="subscriberId" placeholder="رقم المشترك">
        </div>
        <div class="form-group">
            <label>اسم المشترك:</label>
            <input type="text" id="subscriberName" placeholder="اسم المشترك">
        </div>
        <div class="form-group">
            <label>القراءة السابقة:</label>
            <input type="number" id="previousReading" placeholder="0" step="0.01">
        </div>
        <div class="form-group">
            <label>القراءة الحالية:</label>
            <input type="number" id="currentReading" placeholder="0" step="0.01">
        </div>
        <div class="form-group">
            <label>ملاحظات:</label>
            <input type="text" id="readingNotes" placeholder="ملاحظات إضافية">
        </div>
        <div class="modal-buttons">
            <button class="btn-save" onclick="saveReading()">💾 حفظ</button>
            <button class="btn-cancel" onclick="closeReadingModal()">❌ إلغاء</button>
        </div>
    </div>
</div>

<script type="module">
    import { authService } from "./js/auth-service.js";
    import { storageService } from "./js/storage-service.js";

    const currentUser = authService.getCurrentUser();
    if (!currentUser) {
        window.location.href = "index.html";
    }

    function loadReadings() {
        const readings = storageService.get('readings') || [];
        displayReadings(readings);
        updateStats(readings);
    }

    function displayReadings(readings) {
        const table = document.getElementById('readingsTable');
        if (readings.length === 0) {
            table.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #999;">لا توجد قراءات</td></tr>';
            return;
        }

        table.innerHTML = readings.map(r => `
            <tr>
                <td>${new Date(r.date).toLocaleDateString('ar-EG')}</td>
                <td>${r.subscriberId}</td>
                <td>${r.subscriberName}</td>
                <td>${r.previousReading}</td>
                <td>${r.currentReading}</td>
                <td><strong>${r.currentReading - r.previousReading}</strong></td>
                <td>${r.notes || '-'}</td>
                <td>
                    <button class="btn-small btn-delete" onclick="deleteReading('${r.id}')">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function updateStats(readings) {
        const totalUsage = readings.reduce((sum, r) => sum + (r.currentReading - r.previousReading), 0);
        const count = readings.length;
        const avg = count > 0 ? (totalUsage / count).toFixed(2) : 0;

        document.getElementById('totalUsage').textContent = totalUsage;
        document.getElementById('readingCount').textContent = count;
        document.getElementById('avgUsage').textContent = avg;
    }

    window.openReadingModal = () => {
        document.getElementById('readingDate').valueAsDate = new Date();
        document.getElementById('readingModal').style.display = 'block';
    };

    window.closeReadingModal = () => {
        document.getElementById('readingModal').style.display = 'none';
    };

    window.saveReading = () => {
        const reading = {
            id: Date.now(),
            date: document.getElementById('readingDate').value,
            subscriberId: document.getElementById('subscriberId').value,
            subscriberName: document.getElementById('subscriberName').value,
            previousReading: parseFloat(document.getElementById('previousReading').value),
            currentReading: parseFloat(document.getElementById('currentReading').value),
            notes: document.getElementById('readingNotes').value
        };

        if (!reading.subscriberId || reading.currentReading <= 0) {
            alert('❌ يرجى ملء جميع الحقول المطلوبة');
            return;
        }

        const readings = storageService.get('readings') || [];
        readings.push(reading);
        storageService.save('readings', readings);

        alert('✅ تم حفظ القراءة بنجاح');
        closeReadingModal();
        loadReadings();
    };

    window.deleteReading = (id) => {
        if (confirm('هل تريد حذف هذه القراءة؟')) {
            let readings = storageService.get('readings') || [];
            readings = readings.filter(r => r.id != id);
            storageService.save('readings', readings);
            loadReadings();
        }
    };

    window.generateMonthlyReport = () => {
        alert('📊 ميزة التقرير الشهري قيد التطوير');
    };

    window.goBack = () => window.location.href = "dashboard.html";
    window.logout = async () => {
        if (confirm('هل تريد تسجيل الخروج؟')) {
            await authService.logout();
            window.location.href = "index.html";
        }
    };

    loadReadings();
</script>

</body>
</html>
