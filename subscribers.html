<script>

let subscribers = JSON.parse(localStorage.getItem("subscribers")) || [];

function saveData(){
localStorage.setItem(
"subscribers",
JSON.stringify(subscribers)
);
}

function renderTable(){

const table =
document.getElementById("tableBody");

table.innerHTML="";

subscribers.forEach((sub,index)=>{

const consume =
Math.max(
0,
(sub.current||0)-(sub.previous||0)
);

const amount = consume*1000;

table.innerHTML += `

<tr>

<td>${sub.meter}</td>

<td>${sub.name}</td>

<td>${sub.previous||0}</td>

<td>${sub.current||0}</td>

<td>${consume}</td>

<td>${amount}</td>

<td>

<div class="dropdown">

<button class="btn-dots"
onclick="toggleMenu(event,'${index}')">

⋮

</button>

<div id="menu-${index}"
class="dropdown-content">

<a href="#"
onclick="editSub(${index})">

✏️ تعديل

</a>

<a href="#"
onclick="deleteSub(${index})">

🗑 حذف

</a>

</div>

</div>

</td>

</tr>

`;

});

}

document
.getElementById("openAddModal")
.onclick=function(){

const name=
prompt("اسم المشترك");

if(!name)return;

const meter=
prompt("رقم العداد");

subscribers.push({

name,

meter,

previous:0,

current:0

});

saveData();

renderTable();

};

function editSub(index){

const newRead=
prompt(
"ادخل القراءة الحالية",
subscribers[index].current
);

if(newRead===null)return;

subscribers[index].previous =
subscribers[index].current;

subscribers[index].current =
Number(newRead);

saveData();

renderTable();

}

function deleteSub(index){

if(confirm("حذف المشترك؟")){

subscribers.splice(index,1);

saveData();

renderTable();

}

}

function toggleMenu(event,id){

event.stopPropagation();

document
.querySelectorAll(
'.dropdown-content'
)
.forEach(menu=>{

if(menu.id!=='menu-'+id){

menu.classList.remove(
'show'
);

}

});

document
.getElementById(
'menu-'+id
)
.classList.toggle(
'show'
);

}

window.onclick=function(){

document
.querySelectorAll(
'.dropdown-content'
)
.forEach(menu=>{

menu.classList.remove(
'show'
);

});

}

renderTable();

</script>
