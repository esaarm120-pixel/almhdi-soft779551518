<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتركين وقراءة الاستهلاك</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #eef2f7; margin: 10px; padding: 5px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-success { background-color: #28a745; }
        .btn-warning { background-color: #ffc107; color: #333; }
        .table-wrapper { overflow-x: auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 13px; min-width: 900px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
        .form-group { margin-bottom: 12px; text-align: right; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .warn-text { color: red; font-size: 11px; margin-top: 5px; font-weight: bold; }
        .tab-system { display: flex; gap: 10px; margin-bottom: 15px; }

        /* تنسيقات القائمة المنبثقة الجديدة */
        .dropdown { position: relative; display: inline-block; }
        .btn-dots { background: none; border: none; font-size: 20px; cursor: pointer; color: #555; padding: 0 10px; }
        .dropdown-content { 
            display: none; 
            position: absolute; 
            right: 0; 
            background-color: white; 
            min-width: 150px; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.15); 
            border-radius: 6px; 
            z-index: 100; 
        }
        .dropdown-content a { color: #333; padding: 10px 15px; text-decoration: none; display: block; text-align: right; font-size: 13px; }
        .dropdown-content a:hover { background-color: #f1f1f1; border-radius: 6px; }
        .show { display: block; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h2 id="pageTitle">👥 كشف إدارة المشتركين</h2>
        <button class="btn btn-success" id="openAddModal">➕ إضافة مشترك جديد</button>
    </div>

    <div class="tab-system">
        <button class="btn" id="btnTabSubs" onclick="switchView('subs')">👥 قائمة المشتركين</button>
        <button class="btn" id="btnTabReadings" onclick="switchView('reading')">💧 إدخال قراءة الاستهلاك الشهري</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead id="tableHead">
                <tr>
                    <th>رقم العداد</th>
                    <th>اسم المشترك</th>
                    <th>القراءة السابقة</th>
                    <th>القراءة الحالية</th>
                    <th>الاستهلاك</th>
                    <th>المبلغ</th>
                    <th>الخيارات</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td>101</td>
                    <td>عصام المهدي</td>
                    <td>1200</td>
                    <td>1250</td>
                    <td>50</td>
                    <td>50000</td>
                    <td>
                        <div class="dropdown">
                            <button class="btn-dots" onclick="toggleMenu(event, 'sub1')">⋮</button>
                            <div id="menu-sub1" class="dropdown-content">
                                <a href="#" onclick="actionEdit('sub1')">✏️ تعديل البيانات</a>
                                <a href="#" onclick="actionWhatsApp('sub1')">📱 إرسال واتساب</a>
                                <a href="#" onclick="actionPDF('sub1')">🖨️ طباعة PDF</a>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // دالة التحكم بفتح وإغلاق القائمة المنبثقة
        function toggleMenu(event, id) {
            event.stopPropagation();
            
            // إغلاق أي قائمة أخرى مفتوحة أولاً
            document.querySelectorAll('.dropdown-content').forEach(menu => {
                if (menu.id !== 'menu-' + id) {
                    menu.classList.remove('show');
                }
            });

            // فتح أو إغلاق القائمة المستهدفة
            const currentMenu = document.getElementById('menu-' + id);
            currentMenu.classList.toggle('show');
        }

        // إغلاق القائمة إذا ضغط المستخدم في أي مكان خارجها
        window.onclick = function() {
            document.querySelectorAll('.dropdown-content').forEach(menu => {
                menu.classList.remove('show');
            });
        }

        // دوال افتراضية للعمليات لتجربتها
        function actionEdit(id) { alert('تعديل المشترك ذو الرقم: ' + id); }
        function actionWhatsApp(id) { alert('جاري تجهيز الإرسال عبر الواتساب للمشترك: ' + id); }
        function actionPDF(id) { alert('جاري توليد ملف PDF للمشترك: ' + id); }
        function switchView(view) { console.log('الانتقال إلى واجهة: ' + view); }
    </script>
</body>
</html>
