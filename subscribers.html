<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتركين</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
        
        .navbar {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar h1 { font-size: 20px; }
        .navbar button { padding: 8px 15px; background: white; color: #007bff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .navbar button:hover { background: #f0f0f0; }
        
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h2 { color: #333; margin-bottom: 10px; }
        
        .search-bar { margin-bottom: 20px; }
        .search-bar input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #007bff; color: white; padding: 12px; text-align: right; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        
        .btn { padding: 6px 12px; margin: 0 2px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-edit { background: #28a745; color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-back { background: #6c757d; color: white; }
        
        .btn:hover { opacity: 0.8; }
        
        .loading { text-align: center; padding: 40px; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="navbar">
    <h1>👥 إدارة المشتركين</h1>
    <div>
        <button onclick="goBack()" style="margin-right: 10px;">📊 العودة للوحة التحكم</button>
        <button onclick="logout()">🚪 تسجيل الخروج</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h2>قائمة المشتركين</h2>
        <p>إجمالي المشتركين: <strong id="totalCount">0</strong></p>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن مشترك...">
    </div>

    <div id="tableContent">
        <div class="loading">
            <div class="spinner"></div>
            <p>جاري تحميل البيانات...</p>
        </div>
    </div>
</div>

<script type="module">
    import { authService } from "./js/auth-service.js";

    // التحقق من المستخدم
    const currentUser = authService.getCurrentUser();
    if (!currentUser) {
        window.location.href = "index.html";
    }

    // تحميل المشتركين
    async function loadSubscribers() {
        const tableContent = document.getElementById('tableContent');
        
        try {
            // هنا يمكنك استدعاء API أو قاعدة البيانات
            // في الوقت الحالي سنعرض جدول فارغ
            tableContent.innerHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>الرقم</th>
                                <th>الاسم</th>
                                <th>البريد الإلكتروني</th>
                                <th>رقم الهاتف</th>
                                <th>العنوان</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="subscribersTable">
                            <tr>
                                <td colspan="6" style="text-align: center; color: #999;">لا توجد بيانات متاحة حالياً</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('totalCount').textContent = '0';
        } catch (error) {
            console.error('خطأ في تحميل البيانات:', error);
            tableContent.innerHTML = '<p style="color: red; text-align: center;">حدث خطأ في تحميل البيانات</p>';
        }
    }

    loadSubscribers();

    // البحث
    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        // سيتم تطبيق البحث هنا
        console.log('البحث عن:', searchTerm);
    });

    // العودة للوحة التحكم
    window.goBack = function() {
        window.location.href = "dashboard.html";
    };

    // تسجيل الخروج
    window.logout = async function() {
        if (confirm('هل تريد تسجيل الخروج؟')) {
            await authService.logout();
            window.location.href = "index.html";
        }
    };
</script>

</body>
</html>
