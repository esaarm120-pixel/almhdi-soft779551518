<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتركين والفواتير</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #eef2f7; margin: 10px; padding: 5px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-success { background-color: #28a745; }
        .table-wrapper { overflow-x: auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 13px; min-width: 900px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
        .form-group { margin-bottom: 12px; text-align: right; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .warn-text { color: red; font-size: 11px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h2>👥 كشف المشتركين وإدخل الاستهلاك الشهري</h2>
        <button class="btn btn-success" id="openAddModal">➕ إضافة مشترك جديد</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>رقم العداد</th>
                    <th>اسم المشترك</th>
                    <th>رقم الهاتف</th>
                    <th>القراءة السابقة</th>
                    <th>القراءة الحالية</th>
                    <th>الفرق</th>
                    <th>المتأخرات</th>
                    <th>رسوم الاشتراك</th>
                    <th>الواصل</th>
                    <th>المبلغ المتبقي</th>
                    <th>إرسال الفاتورة</th>
                </tr>
            </thead>
            <tbody id="subscribersTableBody">
                </tbody>
        </table>
    </div>
    
    <p style="text-align: center; margin-top: 15px;"><button class="btn" onclick="window.location.href='dashboard.html'">⬅️ العودة للرئيسية</button></p>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <h3>➕ إضافة مشترك جديد</h3>
            <div class="form-group"><label>رقم العداد:</label><input type="number" id="accNo"></div>
            <div class="form-group"><label>اسم المشترك الكامل:</label><input type="text" id="accName" placeholder="الاسم الثنائي على الأقل"></div>
            <div class="form-group"><label>رقم الهاتف المعتمد:</label><input type="number" id="accPhone" placeholder="77xxxxxxx"></div>
            <div class="form-group"><label>القراءة السابقة التأسيسية:</label><input type="number" id="accPrev" value="0"></div>
            <div class="form-group"><label>المتأخرات السابقة:</label><input type="number" id="accLate" value="0"></div>
            <div class="form-group"><label>رسوم الاشتراك الثابتة:</label><input type="number" id="accFee" value="1000"></div>
            <div class="warn-text" id="popErr"></div>
            <button class="btn btn-success" style="width: 100%; margin-top: 10px;" id="btnSaveSub">حفظ في قاعدة البيانات</button>
            <button class="btn" style="width: 100%; background-color:#aaa; margin-top: 5px;" id="btnCloseModal">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBzUUx_A0PyMwtEij_uFyLBwzJPZkVxdnk",
          authDomain: "almhdi-soft779551518.firebaseapp.com",
          projectId: "almhdi-soft779551518",
          storageBucket: "almhdi-soft779551518.firebasestorage.app",
          messagingSenderId: "386533839313",
          appId: "1:386533839313:web:575bc9978c0e38ffd950f0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const modal = document.getElementById('addModal');
        document.getElementById('openAddModal').addEventListener('click', () => modal.style.display = 'flex');
        document.getElementById('btnCloseModal').addEventListener('click', () => modal.style.display = 'none');

        // إضافة مشترك جديد إلى Firebase وحفظه بشكل دائم
        document.getElementById('btnSaveSub').addEventListener('click', async () => {
            const no = document.getElementById('accNo').value;
            const name = document.getElementById('accName').value;
            const phone = document.getElementById('accPhone').value;
            const prev = parseFloat(document.getElementById('accPrev').value) || 0;
            const late = parseFloat(document.getElementById('accLate').value) || 0;
            const fee = parseFloat(document.getElementById('accFee').value) || 0;
            const err = document.getElementById('popErr');

            if(!no || name.trim().length < 5) { err.innerText = "تنبيه: يرجى كتابة البيانات والاسم بشكل صحيح."; return; }
            if(!/^(77|73|71|70)\d{7}$/.test(phone)) { err.innerText = "تنبيه: رقم الهاتف غير صحيح."; return; }
            
            try {
                await addDoc(collection(db, "subscribers"), {
                    meterNo: no,
                    customerName: name,
                    phoneNo: phone,
                    previousReading: prev,
                    currentReading: prev, 
                    diff: 0,
                    lateAmount: late,
                    subFee: fee,
                    paid: 0,
                    rem: (late + fee)
                });
                alert("تم حفظ البيانات بنجاح!");
                modal.style.display = 'none';
                err.innerText = "";
            } catch (e) {
                alert("حدث خطأ أثناء الحفظ، يرجى المحاولة مجدداً.");
            }
        });

        // عرض وجلب المشتركين تلقائياً ومزامنتهم فورياً في الجدول
        onSnapshot(collection(db, "subscribers"), (snapshot) => {
            const tbody = document.getElementById('subscribersTableBody');
            tbody.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${data.meterNo}</td>
                    <td>${data.customerName}</td>
                    <td>${data.phoneNo}</td>
                    <td>${data.previousReading}</td>
                    <td>${data.currentReading}</td>
                    <td>${data.diff}</td>
                    <td>${data.lateAmount}</td>
                    <td>${data.subFee}</td>
                    <td>${data.paid}</td>
                    <td style="color: red; font-weight: bold;">${data.rem}</td>
                    <td><button class="btn" onclick="sendInvoice('${data.customerName}', '${data.phoneNo}', ${data.rem})">📱 واتساب</button></td>
                `;
                tbody.appendChild(tr);
            });
        });
    </script>

    <script>
        function sendInvoice(name, phone, debt) {
            const msg = `المشترك: ${name}\nنود إشعاركم بأن مديونيتكم الحالية لمشروع المياه هي: ${debt} ريال يمني.\nيرجى السداد فوراً، علماً بأنه في حال عدم السداد سيتم فصل العداد تلقائياً.\n\nتطوير وتصميم: عصام المهدي 779551518`;
            window.open(`https://wa.me/967${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
