<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الرئيسية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
        
        .navbar {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar h1 { font-size: 20px; }
        .navbar button { padding: 8px 15px; background: white; color: #007bff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .navbar button:hover { background: #f0f0f0; }
        
        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h2 { color: #333; margin-bottom: 10px; }
        .user-info { display: flex; justify-content: space-between; font-size: 14px; color: #666; }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .menu-btn {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .menu-btn:hover { transform: translateY(-5px); }
        .menu-btn.admin { background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%); }
        .menu-btn.secondary { background: linear-gradient(135deg, #6c757d 0%, #545b62 100%); }
        
        .stats { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats h3 { margin-bottom: 15px; color: #333; }
        
        .loading { text-align: center; padding: 20px; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="navbar">
    <h1>🚰 نظام إدارة المياه</h1>
    <button onclick="logout()">🚪 تسجيل الخروج</button>
</div>

<div class="container">
    <div class="header">
        <h2>👋 أهلاً وسهلاً</h2>
        <div class="user-info">
            <div>👤 المستخدم: <strong id="userName">جاري التحميل...</strong></div>
            <div>🔐 الدور: <strong id="userRole">جاري التحميل...</strong></div>
            <div>📁 المشروع: <strong id="projectName">جاري التحميل...</strong></div>
        </div>
    </div>

    <div id="dashboardContent">
        <div class="loading">
            <div class="spinner"></div>
            <p>جاري تحميل لوحة التحكم...</p>
        </div>
    </div>

    <div class="stats">
        <h3>📊 الإحصائيات</h3>
        <p>عدد المشتركين: <strong id="totalSubscribers">0</strong></p>
        <p>عدد الموظفين: <strong id="totalEmployees">0</strong></p>
        <p>إجمالي المصروفات: <strong id="totalExpenses">0</strong> ريال</p>
    </div>
</div>

<script type="module">
    import { authService } from "./js/auth-service.js";
    import { userManagementService } from "./js/auth-service.js";
    import { projectDataService } from "./js/project-service.js";

    // التحقق من المستخدم
    const currentUser = authService.getCurrentUser();
    if (!currentUser) {
        window.location.href = "index.html";
    }

    // عرض بيانات المستخدم
    document.getElementById('userName').textContent = currentUser.displayName;
    document.getElementById('userRole').textContent = currentUser.role === 'admin' ? '🔐 مدير المشروع' : '👨‍💼 موظف';
    document.getElementById('projectName').textContent = currentUser.projectId ? currentUser.projectId.substring(0, 10) : 'عام';

    // بناء لوحة التحكم
    async function loadDashboard() {
        const content = document.getElementById('dashboardContent');
        
        if (currentUser.role === 'admin') {
            // قائمة Admin
            content.innerHTML = `
                <div class="menu-grid">
                    <button class="menu-btn admin" onclick="window.location.href='subscribers.html'">👥 المشتركين</button>
                    <button class="menu-btn admin" onclick="window.location.href='readings.html'">💧 القراءات</button>
                    <button class="menu-btn admin" onclick="window.location.href='users-management.html'">👨‍💼 إدارة الموظفين</button>
                    <button class="menu-btn admin" onclick="window.location.href='expenses.html'">💰 المصروفات</button>
                </div>
            `;
        } else {
            // قائمة Operator/Viewer
            content.innerHTML = `
                <div class="menu-grid">
                    <button class="menu-btn" onclick="window.location.href='subscribers.html'">👥 المشتركين</button>
                    <button class="menu-btn" onclick="window.location.href='readings.html'">💧 القراءات</button>
                </div>
            `;
        }
    }

    loadDashboard();

    // تسجيل الخروج
    window.logout = async function() {
        if (confirm('هل تريد تسجيل الخروج؟')) {
            await authService.logout();
            window.location.href = "index.html";
        }
    };
</script>

</body>
</html>
