<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتركين</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
        
        .navbar {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar h1 { font-size: 20px; }
        .navbar button { padding: 8px 15px; background: white; color: #007bff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .navbar button:hover { background: #f0f0f0; }
        
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h2 { color: #333; margin-bottom: 10px; }
        
        .search-bar { margin-bottom: 20px; }
        .search-bar input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #007bff; color: white; padding: 12px; text-align: right; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        
        .btn { padding: 6px 12px; margin: 0 2px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-edit { background: #28a745; color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-print { background: #17a2b8; color: white; }
        .btn-whatsapp { background: #25d366; color: white; }
        .btn:hover { opacity: 0.8; }
        
        .loading { text-align: center; padding: 40px; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-active { background-color: #d4edda; color: #155724; }
        .status-inactive { background-color: #f8d7da; color: #721c24; }

        .error-message, .success-message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        .error-message { background-color: #fee; color: #c33; }
        .success-message { background-color: #efe; color: #3c3; }
    </style>
</head>
<body>

<div class="navbar">
    <h1>👥 إدارة المشتركين</h1>
    <div>
        <button onclick="goBack()" style="margin-right: 10px;">📊 العودة للوحة التحكم</button>
        <button onclick="logout()">🚪 تسجيل الخروج</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h2>قائمة المشتركين</h2>
        <p>إجمالي المشتركين: <strong id="totalCount">0</strong></p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن مشترك...">
    </div>

    <div id="tableContent">
        <div class="loading">
            <div class="spinner"></div>
            <p>جاري تحميل البيانات...</p>
        </div>
    </div>
</div>

<script type="module">
    import { authService } from "./js/auth-service.js";
    import { subscriberService } from "./js/subscriber-service.js";
    import { checkPermissionOrRedirect, PERMISSIONS } from "./js/auth-system.js";

    let allSubscribers = [];

    // التحقق من المستخدم والصلاحيات
    const currentUser = authService.getCurrentUser();
    if (!currentUser) {
        window.location.href = "index.html";
    }

    // التحقق من صلاحية عرض المشتركين
    checkPermissionOrRedirect(PERMISSIONS.VIEW_SUBSCRIBERS);

    // تحميل المشتركين من Firestore
    async function loadSubscribers() {
        const tableContent = document.getElementById('tableContent');
        
        try {
            const subscribers = await subscriberService.getAllSubscribers();
            allSubscribers = subscribers;

            if (subscribers.length === 0) {
                tableContent.innerHTML = `
                    <div class="table-container">
                        <table>
                            <thead><tr>
                                <th>الرقم</th><th>الاسم</th><th>البريد الإلكتروني</th><th>رقم الهاتف</th>
                                <th>العنوان</th><th>الحالة</th><th>الإجراءات</th>
                            </tr></thead>
                            <tbody><tr>
                                <td colspan="7" style="text-align: center; color: #999;">لا توجد بيانات متاحة حالياً</td>
                            </tr></tbody>
                        </table>
                    </div>
                `;
                document.getElementById('totalCount').textContent = '0';
                return;
            }

            renderTable(subscribers);
            document.getElementById('totalCount').textContent = subscribers.length;

        } catch (error) {
            console.error('❌ خطأ في تحميل البيانات:', error);
            showError(`خطأ في تحميل البيانات: ${error.message}`);
        }
    }

    function renderTable(subscribers) {
        let tableHTML = `
            <div class="table-container">
                <table>
                    <thead><tr>
                        <th>الرقم</th><th>الاسم</th><th>البريد الإلكتروني</th><th>رقم الهاتف</th>
                        <th>العنوان</th><th>الحالة</th><th>الإجراءات</th>
                    </tr></thead>
                    <tbody>
        `;

        subscribers.forEach((subscriber, index) => {
            const statusClass = subscriber.status === 'active' ? 'status-active' : 'status-inactive';
            const statusText = subscriber.status === 'active' ? '✅ نشط' : '❌ غير نشط';
            
            tableHTML += `<tr>
                <td>${index + 1}</td>
                <td>${subscriber.name || '-'}</td>
                <td>${subscriber.email || '-'}</td>
                <td>${subscriber.phone || '-'}</td>
                <td>${subscriber.address || '-'}</td>
                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                <td>
                    ${hasPermission(PERMISSIONS.PRINT_SUBSCRIBER_INVOICE) ? `<button class="btn btn-print" onclick="printInvoice('${subscriber.id}')">🖨️</button>` : ''}
                    ${hasPermission(PERMISSIONS.SEND_SUBSCRIBER_WHATSAPP) ? `<button class="btn btn-whatsapp" onclick="sendWhatsApp('${subscriber.phone}')">💬</button>` : ''}
                    ${hasPermission(PERMISSIONS.EDIT_SUBSCRIBER) ? `<button class="btn btn-edit" onclick="editSubscriber('${subscriber.id}')">✏️</button>` : ''}
                    ${hasPermission(PERMISSIONS.DELETE_SUBSCRIBER) ? `<button class="btn btn-delete" onclick="deleteSubscriber('${subscriber.id}')">🗑️</button>` : ''}
                </td>
            </tr>`;
        });

        tableHTML += `</tbody></table></div>`;
        document.getElementById('tableContent').innerHTML = tableHTML;
    }

    function hasPermission(permission) {
        const userData = JSON.parse(localStorage.getItem('currentUser'));
        if (!userData || !userData.permissions) return false;
        return userData.permissions.includes(permission);
    }

    // البحث الحي
    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        
        if (!searchTerm) {
            renderTable(allSubscribers);
            return;
        }

        const filtered = allSubscribers.filter(sub => 
            (sub.name && sub.name.toLowerCase().includes(searchTerm)) ||
            (sub.email && sub.email.toLowerCase().includes(searchTerm)) ||
            (sub.phone && sub.phone.includes(searchTerm))
        );

        if (filtered.length === 0) {
            document.getElementById('tableContent').innerHTML = `
                <div style="background: white; padding: 20px; border-radius: 8px; text-align: center;">
                    <p style="color: #999;">لم يتم العثور على نتائج</p>
                </div>
            `;
        } else {
            renderTable(filtered);
        }
    });

    // الدوال العامة
    window.goBack = () => window.location.href = "dashboard.html";

    window.logout = async () => {
        if (confirm('هل تريد تسجيل الخروج؟')) {
            await authService.logout();
            window.location.href = "index.html";
        }
    };

    window.deleteSubscriber = async (id) => {
        if (!hasPermission(PERMISSIONS.DELETE_SUBSCRIBER)) {
            showError('ليس لديك صلاحية لحذف المشتركين');
            return;
        }
        if (confirm('هل أنت متأكد من حذف هذا المشترك؟')) {
            try {
                await subscriberService.deleteSubscriber(id);
                showSuccess('تم حذف المشترك بنجاح');
                loadSubscribers();
            } catch (error) {
                showError(`خطأ: ${error.message}`);
            }
        }
    };

    window.printInvoice = (id) => alert(`🖨️ طباعة: ${id}\n(سيتم التطوير)`);
    window.editSubscriber = (id) => alert(`✏️ تعديل: ${id}\n(سيتم التطوير)`);

    window.sendWhatsApp = (phone) => {
        if (!phone) {
            showError('لا يوجد رقم هاتف');
            return;
        }
        window.open(`https://wa.me/${phone.replace(/[^\d]/g, '')}`, '_blank');
    };

    function showError(msg) {
        const el = document.getElementById('errorMessage');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMessage');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 5000);
    }

    loadSubscribers();
</script>

</body>
</html>
