<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتركين</title>
    <style>
        /* (استخدم نفس تنسيقاتك الأصلية هنا لضمان بقاء الشكل كما هو) */
    </style>
</head>
<body>

<div class="navbar">
    <h1>👥 إدارة المشتركين</h1>
    <div>
        <button onclick="window.location.href='dashboard.html'" style="margin-right: 10px;">📊 العودة للوحة التحكم</button>
        <button id="logoutBtn">🚪 تسجيل الخروج</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h2>قائمة المشتركين</h2>
        <p>إجمالي المشتركين: <strong id="totalCount">0</strong></p>
    </div>

    <div id="tableContent">
        <div class="loading"><div class="spinner"></div><p>جاري تحميل البيانات...</p></div>
    </div>
</div>

<script type="module">
    import { protectPage, logoutUser } from "./js/auth-manager.js";
    import { subscriberService } from "./js/subscriber-service.js";

    // 1. تفعيل الحماية المركزية (تسمح لك بالدخول فوراً إذا كنت أدمن)
    protectPage();

    // 2. ربط زر الخروج المركزي
    document.getElementById('logoutBtn').addEventListener('click', logoutUser);

    // 3. تحميل البيانات (باقي كودك كما هو)
    async function loadSubscribers() {
        try {
            const subscribers = await subscriberService.getAllSubscribers();
            document.getElementById('totalCount').textContent = subscribers.length;
            // ... (بقية كود رندر الجدول)
            console.log("تم تحميل البيانات:", subscribers);
        } catch (error) {
            console.error('❌ خطأ:', error);
        }
    }

    loadSubscribers();
</script>

</body>
</html>
