<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مياه الحسينية - تسجيل الدخول</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .login-wrapper { background: white; border-radius: 12px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15); width: 100%; max-width: 420px; padding: 40px 30px; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .logo-section { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 60px; margin-bottom: 15px; }
        h1 { color: #333; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 13px; line-height: 1.6; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input[type="email"], input[type="password"] { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; background-color: #f9f9f9; }
        .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .error-message { display: none; background-color: #fee; color: #c33; padding: 12px 15px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; border-right: 4px solid #c33; }
        .success-message { display: none; background-color: #efe; color: #3c3; padding: 12px 15px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; border-right: 4px solid #3c3; }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="logo-section">
        <div class="logo">🚰</div>
        <h1>نظام إدارة المياه</h1>
        <p class="subtitle">منظومة محاسبية متكاملة لإدارة مشاريع المياه</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>📧 البريد الإلكتروني:</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>
        <div class="form-group">
            <label>🔒 كلمة المرور:</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">🔓 تسجيل الدخول</button>
    </form>
</div>

<script type="module">
    import { authService } from "./js/auth-service.js";
    import { errorMessages } from "./config/firebase-config.js";
    import { redirectToDashboard } from "./js/auth-system.js";

    // التحقق التلقائي عند فتح الصفحة (بدون حلقة مفرغة)
    authService.onAuthStateChanged((user) => {
        if (user && localStorage.getItem('currentUser')) {
            console.log('✅ المستخدم مسجل دخول بالفعل، جاري التوجيه الذكي...');
            redirectToDashboard();
        }
    });

    window.handleLogin = async function(event) {
        event.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const loginBtn = document.getElementById('loginBtn');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        loginBtn.disabled = true;

        try {
            const { user, userData } = await authService.login(email, password);
            authService.saveUserToLocalStorage(user, userData);
            
            successDiv.textContent = `✅ مرحباً بك! جاري الدخول...`;
            successDiv.style.display = 'block';
            
            // استخدام التوجيه الذكي المدمج في auth-system.js
            redirectToDashboard(); 
            
        } catch (error) {
            const errorMessage = errorMessages[error.code] || error.message;
            errorDiv.textContent = `❌ ${errorMessage}`;
            errorDiv.style.display = 'block';
            loginBtn.disabled = false;
        }
    };
</script>

</body>
</html>
