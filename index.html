<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مياه الحسينية - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .login-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #007bff;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.3);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            display: none;
            background-color: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            border-right: 4px solid #c33;
        }

        .success-message {
            display: none;
            background-color: #efe;
            color: #3c3;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            border-right: 4px solid #3c3;
        }

        .demo-info {
            background-color: #e7f3ff;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #0056b3;
            border-right: 4px solid #007bff;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .footer-text {
            color: #999;
            font-size: 11px;
            line-height: 1.6;
        }

        .footer-link {
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="logo-section">
        <div class="logo">🚰</div>
        <h1>نظام إدارة المياه</h1>
        <p class="subtitle">منظومة محاسبية متكاملة لإدارة مشاريع المياه</p>
    </div>

    <div class="demo-info">
        📌 استخدم بيانات حسابك على Firebase للدخول
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="email">📧 البريد الإلكتروني:</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>

        <div class="form-group">
            <label for="password">🔒 كلمة المرور:</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">🔓 تسجيل الدخول</button>
    </form>

    <div class="footer">
        <p class="footer-text">
            برمجة وتطوير: <strong>عصام المهدي</strong><br>
            📱 <a href="https://wa.me/967779551518" class="footer-link">779551518</a>
            <br><small style="color: #ccc;">v2.0 Firebase | 2026</small>
        </p>
    </div>
</div>

<script type="module">
    import { authService } from "./js/auth-service.js";
    import { errorMessages } from "./config/firebase-config.js";

    authService.onAuthStateChanged((user) => {
        if (user) {
            console.log('✅ مستخدم مسجل دخول:', user.email);
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
        }
    });

    window.handleLogin = async function(event) {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const loginBtn = document.getElementById('loginBtn');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (!email || !password) {
            showError(errorDiv, '❌ يرجى ملء جميع الحقول');
            return;
        }

        loginBtn.disabled = true;

        try {
            const { user, userData } = await authService.login(email, password);
            authService.saveUserToLocalStorage(user, userData);
            successDiv.textContent = `✅ مرحباً بك! جاري التحويل...`;
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);
        } catch (error) {
            const errorCode = error.code;
            const errorMessage = errorMessages[errorCode] || error.message;
            showError(errorDiv, `❌ ${errorMessage}`);
        } finally {
            loginBtn.disabled = false;
        }
    };

    function showError(element, message) {
        element.textContent = message;
        element.style.display = 'block';
    }
</script>

</body>
</html>
