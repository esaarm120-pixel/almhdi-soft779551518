<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة المياه - تسجيل الدخول</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Tahoma;
    background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
}

/* LOGIN BOX */
.login-wrapper {
    background: #2d2d44;
    border-radius: 15px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    width: 100%;
    max-width: 420px;
    padding: 35px;
    border: 1px solid #3d3d5c;
}

.logo-section {
    text-align: center;
    margin-bottom: 25px;
}

.logo { font-size: 55px; }

h1 {
    color: #fff;
    font-size: 22px;
}

.subtitle {
    color: #aaa;
    font-size: 13px;
    margin-top: 5px;
}

/* INPUTS */
.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    color: #ccc;
    margin-bottom: 6px;
    font-size: 13px;
}

input {
    width: 100%;
    padding: 12px;
    border: 2px solid #3d3d5c;
    border-radius: 6px;
    background: #1e1e2e;
    color: white;
    font-size: 14px;
}

input:focus {
    border-color: #667eea;
    outline: none;
}

/* BUTTON */
.login-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
}

/* MESSAGES */
.error-message, .success-message {
    display:none;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    font-size: 13px;
}

.error-message {
    background: rgba(255,0,0,0.15);
    color: #ff6b6b;
}

.success-message {
    background: rgba(0,255,0,0.15);
    color: #00ff88;
}

/* LINK */
.signup-link {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
    color: #aaa;
}

/* ===================== */
/* 🔥 MOBILE FIX ONLY */
/* ===================== */
@media (max-width: 768px){

body{
    padding: 10px;
    align-items: flex-start;
}

.login-wrapper{
    padding: 25px;
    border-radius: 12px;
}

h1{
    font-size: 20px;
}

.logo{
    font-size: 45px;
}

input{
    font-size: 15px;
}

.login-btn{
    font-size: 14px;
    padding: 12px;
}

}
</style>
</head>
