<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مياه الحسينية - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .login-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #007bff;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            display: none;
            background-color: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            border-right: 4px solid #c33;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            display: none;
            background-color: #efe;
            color: #3c3;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            border-right: 4px solid #3c3;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .footer-text {
            color: #999;
            font-size: 11px;
            line-height: 1.6;
        }

        .footer-link {
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

        .demo-info {
            background-color: #e7f3ff;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #0056b3;
            border-right: 4px solid #007bff;
        }

        /* تجاوب الأجهزة */
        @media (max-width: 480px) {
            .login-wrapper {
                padding: 30px 20px;
            }

            .logo {
                font-size: 50px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <!-- قسم الشعار -->
    <div class="logo-section">
        <div class="logo">🚰</div>
        <h1>نظام إدارة المياه</h1>
        <p class="subtitle">منظومة محاسبية متكاملة لإدارة مشاريع المياه<br>مشروع مياه قرية الحسينية</p>
    </div>

    <!-- رسالة المعلومات -->
    <div class="demo-info">
        📌 استخدم بيانات حسابك على Firebase للدخول
    </div>

    <!-- رسالة الخطأ -->
    <div class="error-message" id="errorMessage"></div>

    <!-- رسالة النجاح -->
    <div class="success-message" id="successMessage"></div>

    <!-- نموذج تسجيل الدخول -->
    <form id="loginForm" onsubmit="handleLogin(event)">
        <!-- حقل البريد الإلكتروني -->
        <div class="form-group">
            <label for="email">📧 البريد الإلكتروني:</label>
            <input 
                type="email" 
                id="email" 
                placeholder="example@gmail.com" 
                required
                autocomplete="email"
            >
        </div>

        <!-- حقل كلمة المرور -->
        <div class="form-group">
            <label for="password">🔒 كلمة المرور:</label>
            <input 
                type="password" 
                id="password" 
                placeholder="••••••••" 
                required
                autocomplete="current-password"
            >
        </div>

        <!-- زر تسجيل الدخول -->
        <button type="submit" class="login-btn" id="loginBtn">
            <span id="btnText">🔓 تسجيل الدخول</span>
            <div class="loading-spinner" id="loadingSpinner"></div>
        </button>
    </form>

    <!-- تذييل الصفحة -->
    <div class="footer">
        <p class="footer-text">
            برمجة وتطوير: <strong>عصام المهدي</strong><br>
            📱 <a href="https://wa.me/967779551518" class="footer-link">779551518</a>
            <br><br>
            <small style="color: #ccc;">v1.0 | 2026</small>
        </p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { firebaseConfig, errorMessages } from "./config/firebase-config.js";

    // 🚀 تهيئة Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ✅ التحقق من حالة المستخدم عند تحميل الصفحة
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // المستخدم مسجل دخول بالفعل
            console.log('✅ مستخدم مسجل دخول:', user.email);
            saveUserToLocalStorage(user);
            // إعادة التوجيه بعد 1 ثانية
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
        }
    });

    /**
     * 🔐 دالة التعامل مع تسجيل الدخول
     */
    window.handleLogin = async function(event) {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('loadingSpinner');

        // 🔄 إخفاء الرسائل السابقة
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        // ✅ التحقق من صحة البيانات
        if (!email || !password) {
            showError(errorDiv, '❌ يرجى ملء جميع الحقول المطلوبة');
            return;
        }

        if (!isValidEmail(email)) {
            showError(errorDiv, '❌ البريد الإلكتروني غير صحيح');
            return;
        }

        if (password.length < 6) {
            showError(errorDiv, '❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
            return;
        }

        // 🔒 تعطيل الزر أثناء المعالجة
        loginBtn.disabled = true;
        btnText.style.display = 'none';
        spinner.style.display = 'block';

        try {
            // 🔑 محاولة تسجيل الدخول
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 💾 حفظ بيانات المستخدم محلياً
            saveUserToLocalStorage(user);

            // ✅ عرض رسالة النجاح
            successDiv.textContent = `✅ مرحباً بك ${user.email}! جاري التحويل...`;
            successDiv.style.display = 'block';

            // 🔄 إعادة التوجيه بعد ثانية واحدة
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);

        } catch (error) {
            // ❌ معالجة الأخطاء
            const errorCode = error.code;
            const errorMessage = errorMessages[errorCode] || error.message;
            showError(errorDiv, `❌ ${errorMessage}`);
            console.error('❌ خطأ في تسجيل الدخول:', error);

        } finally {
            // ✅ إعادة تفعيل الزر
            loginBtn.disabled = false;
            btnText.style.display = 'inline';
            spinner.style.display = 'none';
        }
    };

    /**
     * 💾 دالة حفظ بيانات المستخدم في LocalStorage
     */
    function saveUserToLocalStorage(user) {
        const userData = {
            uid: user.uid,
            email: user.email,
            displayName: user.displayName || 'مستخدم',
            photoURL: user.photoURL || '',
            loginTime: new Date().toISOString()
        };
        localStorage.setItem('currentUser', JSON.stringify(userData));
    }

    /**
     * ✅ دالة التحقق من صحة البريد الإلكتروني
     */
    function isValidEmail(email) {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return regex.test(email);
    }

    /**
     * ❌ دالة عرض رسالة الخطأ
     */
    function showError(element, message) {
        element.textContent = message;
        element.style.display = 'block';
    }
</script>

</body>
</html>
