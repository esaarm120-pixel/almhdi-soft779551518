<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المياه - تسجيل الدخول</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-wrapper { background: white; border-radius: 15px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2); width: 100%; max-width: 420px; padding: 40px; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .logo-section { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 60px; margin-bottom: 15px; }
        h1 { color: #333; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 13px; line-height: 1.6; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input[type="email"], input[type="password"] { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; background-color: #f9f9f9; transition: all 0.3s; }
        input:focus { outline: none; border-color: #667eea; background-color: #fff; }
        .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-message { display: none; background-color: #fee; color: #c33; padding: 12px 15px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; border-right: 4px solid #c33; animation: slideIn 0.3s; }
        .success-message { display: none; background-color: #efe; color: #3c3; padding: 12px 15px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; border-right: 4px solid #3c3; animation: slideIn 0.3s; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .signup-link { text-align: center; margin-top: 15px; font-size: 13px; }
        .signup-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="logo-section">
        <div class="logo">🚰</div>
        <h1>نظام إدارة المياه</h1>
        <p class="subtitle">منظومة محاسبية متكاملة لإدارة مشاريع المياه</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <div id="loginForm">
        <div class="form-group">
            <label>📧 البريد الإلكتروني:</label>
            <input type="email" id="email" placeholder="example@gmail.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label>🔒 كلمة المرور:</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="button" class="login-btn" id="loginBtn" onclick="handleLogin(event)">🔓 تسجيل الدخول</button>
    </div>

    <div class="signup-link">
        ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a>
    </div>
</div>

<script type="module">
    import { db, auth } from "./config/firebase-config.js";
    import { errorMessages } from "./config/firebase-config.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    function executeSmartDirection(userData) {
        const role = userData.role;
        alert("🔄 جاري التوجيه إلى صفحة الـ رول: " + role);
        if (role === "super_admin") {
            window.location.href = "super-admin.html";
        } else if (role === "project_admin") {
            window.location.href = "dashboard.html";
        } else {
            window.location.href = "dashboard.html";
        }
    }

    // التحقق التلقائي عند فتح الصفحة
    const localUser = localStorage.getItem('currentUser');
    if (localUser) {
        try {
            const parsedUser = JSON.parse(localUser);
            if (parsedUser && parsedUser.uid) {
                executeSmartDirection(parsedUser);
            }
        } catch (e) {
            localStorage.removeItem('currentUser');
        }
    }

    // ربط الدالة بـ window لضمان عملها مع onclick في الهواتف
    window.handleLogin = async function(event) {
        if(event) {
            event.preventDefault();
            event.stopPropagation();
        }
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const loginBtn = document.getElementById('loginBtn');

        if (!email || !password) {
            alert("⚠️ يرجى ملء الحقول أولاً");
            return;
        }

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        loginBtn.disabled = true;
        loginBtn.textContent = '⏳ جاري المعالجة...';

        try {
            // 1️⃣ التحقق من الحساب
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const userId = userCredential.user.uid;
            
            alert("🔒 خطوة 1 نجحت: تم التحقق من الحساب بنجاح!");

            // 2️⃣ جلب البيانات من Firestore
            const userDoc = await getDoc(doc(db, "users", userId));
            
            if (userDoc.exists()) {
                const userData = userDoc.data();
                
                alert("📂 خطوة 2 نجحت: تم العثور على بياناتك. الصلاحية هي: " + userData.role);

                if (userData.status !== "active") {
                    throw { code: "custom/inactive-account", message: "هذا الحساب معطل حالياً" };
                }

                const sessionData = {
                    uid: userId,
                    email: userData.email,
                    role: userData.role,
                    projectId: userData.projectId || null, 
                    displayName: `${userData.firstName || ''} ${userData.lastName || ''}`.trim()
                };
                
                localStorage.setItem('currentUser', JSON.stringify(sessionData));
                
                executeSmartDirection(sessionData);
            } else {
                throw { code: "custom/user-not-found", message: "المستخدم غير مسجل في مستندات Firestore" };
            }
            
        } catch (error) {
            alert("❌ حدث خطأ أثناء الدخول: " + (error.message || error.code));
            errorDiv.textContent = `❌ ${error.message || error.code}`;
            errorDiv.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.textContent = '🔓 تسجيل الدخول';
        }
    };
</script>
</body>
</html>
